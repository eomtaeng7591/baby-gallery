<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyo's Cute Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDF6FF;
  --hero-bg:#F8F0FF;
  --surface:#fff;
  --rose:#E8789A;
  --rose-light:#FFE0F0;
  --lav:#C47DB8;
  --lav-light:#EED8F8;
  --mint:#6ECFAC;
  --mint-light:#D8F5EC;
  --text:#3A2840;
  --muted:#9A80AA;
  --radius:18px;
}
body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── HERO ── */
.hero{
  background:var(--hero-bg);
  padding:1rem 1rem 0;
  position:relative;
  overflow:hidden;
}
.hero-inner{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:600px;
  margin:0 auto;
  gap:0;
}
.hero-text{
  flex:1;
  padding:0.4rem 0 0.4rem 0.25rem;
  z-index:2;
}
.hero-eyebrow{
  font-size:11px;
  font-weight:700;
  color:var(--lav);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:4px;
}
.hero-title{
  font-size:22px;
  font-weight:900;
  line-height:1.15;
  color:var(--text);
  margin-bottom:6px;
}
.hero-title em{
  font-style:normal;
  color:var(--lav);
}
.hero-pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  background:white;
  border-radius:20px;
  padding:5px 12px;
  font-size:12px;
  font-weight:800;
  color:var(--text);
  box-shadow:0 2px 12px rgba(180,120,210,0.15);
}
.hero-pill .n{color:var(--lav);font-size:15px;}
.hero-sub{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:0.3px}
.hero-animals{
  flex-shrink:0;
  width:160px;
  height:130px;
  position:relative;
}
.hero-animals svg{
  width:100%;
  height:100%;
}

/* ── FAB ── */
.fab{
  position:fixed;
  bottom:24px;right:20px;
  z-index:100;
  width:56px;height:56px;
  border-radius:50%;
  background:linear-gradient(135deg,#E8789A,#C47DB8);
  border:none;color:white;
  font-size:26px;font-weight:300;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(200,100,180,0.4);
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.2s,box-shadow 0.2s;
}
.fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(200,100,180,0.5)}
.fab:active{transform:scale(0.95)}

/* ── GALLERY ── */
.gallery-section{padding:1rem 1rem 5rem}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
.photo-card{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  aspect-ratio:2/1;
  background:var(--lav-light);
  cursor:pointer;
  transition:transform 0.2s cubic-bezier(.34,1.56,.64,1),box-shadow 0.2s;
}
.photo-card:nth-child(7n+1){grid-column:span 2;grid-row:span 2;border-radius:18px}
.photo-card:nth-child(7n+1){aspect-ratio:auto}
.photo-card:hover{transform:scale(1.025);box-shadow:0 6px 20px rgba(180,100,200,0.18)}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s}
.photo-card:hover img{transform:scale(1.04)}

/* ── LIGHTBOX ── */
.lightbox{
  position:fixed;inset:0;
  background:rgba(15,8,20,0.92);
  display:none;
  align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
  z-index:300;
  padding:1.5rem;
}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:68vh;border-radius:16px;object-fit:contain}
.lightbox-name{color:rgba(255,255,255,0.5);font-size:11px;font-weight:700;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lightbox-row{display:flex;gap:10px;align-items:center}
.lb-close{background:rgba(255,255,255,0.12);border:none;border-radius:50%;width:46px;height:46px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background 0.15s}
.lb-close:hover{background:rgba(255,255,255,0.22)}
.lb-delete{background:rgba(232,80,80,0.8);border:none;border-radius:22px;padding:12px 22px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;transition:background 0.15s,transform 0.1s}
.lb-delete:hover{background:rgba(210,50,50,0.9);transform:scale(1.03)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.38);display:none;align-items:flex-end;justify-content:center;z-index:200}
.modal-bg.open{display:flex}
.modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:580px;padding:1.25rem 1.5rem 2.5rem;animation:up 0.3s cubic-bezier(.34,1.56,.64,1)}
@keyframes up{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;border-radius:2px;background:#EED8F8;margin:0 auto 1rem}
.modal-title{font-size:17px;font-weight:800;margin-bottom:1rem;color:var(--text)}
.upload-zone{border:2px dashed #DDC0F0;border-radius:16px;background:#FBF4FF;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:all 0.2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--lav);background:var(--lav-light)}
.uz-icon{font-size:34px;margin-bottom:8px}
.uz-title{font-size:14px;font-weight:800;margin-bottom:4px;color:var(--text)}
.uz-desc{font-size:12px;color:var(--muted);font-weight:600}
.prog-wrap{margin-top:1rem;display:none}
.prog-track{background:#EED8F8;border-radius:20px;height:7px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--lav));border-radius:20px;width:0%;transition:width 0.25s}
.prog-lbl{font-size:11px;color:var(--lav);margin-top:5px;text-align:center;font-weight:700}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;display:none}
.empty.show{display:block}
.empty-icon{font-size:52px;margin-bottom:12px;animation:wag 2s ease-in-out infinite}
@keyframes wag{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.empty-t{font-size:17px;font-weight:800;margin-bottom:6px}
.empty-s{font-size:12px;color:var(--muted);font-weight:600}

/* ── LOADING ── */
.loading{text-align:center;padding:3rem 1rem;display:none}
.loading.show{display:block}
.loading-icon{font-size:32px;animation:beat 1s ease-in-out infinite}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.loading-t{font-size:12px;color:var(--muted);margin-top:10px;font-weight:700}

/* ── TOAST ── */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(50px);background:#3A2840;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;font-weight:700;white-space:nowrap;transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);z-index:500;pointer-events:none;opacity:0}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:440px){
  .hero-title{font-size:19px}
  .hero-animals{width:130px;height:110px}
  .gallery-grid{gap:6px}
}
</style>
</head>

<section class="gallery-section">

    <div class="empty-icon">🐣</div>
    <div class="empty-t">No photos yet · 아직 사진이 없어요</div>

<!-- ── FAB ── -->
<button class="fab" onclick="openModal()" aria-label="사진 추가">＋</button>

<!-- ── UPLOAD MODAL ── -->
<div class="modal-bg" id="modal-bg" onclick="bgClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📷 Add Photos · 사진 추가</div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" multiple style="display:none">
      <div class="uz-icon">🖼️</div>
      <div class="uz-title">Click or Drag · 클릭하거나 드래그</div>
      <div class="uz-desc">Multiple files supported · 여러 장 동시 업로드</div>
    </div>
    <div class="prog-wrap" id="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      <div class="prog-lbl" id="prog-lbl">업로드 중...</div>
    </div>

  <div class="lightbox-name" id="lb-name"></div>
  <div class="lightbox-row">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-delete" id="lb-del-btn">🗑 Delete · 삭제</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var CLOUD  = 'djmvsyi3g';
var PRESET = 'baby_gallery';
var GAS    = 'https://script.google.com/macros/s/AKfycby2h5oFWj3by-JAJbJ8S8slKET71MD_Baci_BRkXT1srfDITNCXfn35oo_L94gLoaic/exec';

var lbItem = null, lbCard = null;

function toast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, dur||2500);
}

function updateUI() {
  var n = document.querySelectorAll('.photo-card').length;
  document.getElementById('photo-count').textContent = n;
  document.getElementById('empty').classList.toggle('show', n === 0);
}

function openModal() {
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('prog-wrap').style.display = 'none';
  document.getElementById('prog-fill').style.width = '0%';
}
function bgClick(e) { if (e.target === document.getElementById('modal-bg')) closeModal(); }

async function loadPhotos() {
  document.getElementById('loading').classList.add('show');
  document.getElementById('gallery').innerHTML = '';
  try {
    var r = await fetch(GAS + '?action=list&_=' + Date.now());
    var list = await r.json();
    if (Array.isArray(list)) list.forEach(function(item){ renderCard(item, false); });
  } catch(e) { console.error(e); }
  document.getElementById('loading').classList.remove('show');
  updateUI();
}

function renderCard(item, prepend) {
  var grid = document.getElementById('gallery');
  var card = document.createElement('div');
  card.className = 'photo-card';
  var img = document.createElement('img');
  img.src = item.url;
  img.alt = item.name || '';
  img.loading = 'lazy';
  card.appendChild(img);
  card.addEventListener('click', function(){ openLightbox(item, card); });
  if (prepend && grid.firstChild) grid.insertBefore(card, grid.firstChild);
  else grid.appendChild(card);
}

async function handleFiles(fileList) {
  var files = Array.from(fileList).filter(function(f){ return f.type.startsWith('image/'); });
  if (!files.length) { toast('이미지 파일만 업로드할 수 있어요'); return; }
  var pw = document.getElementById('prog-wrap');
  var fill = document.getElementById('prog-fill');
  var lbl  = document.getElementById('prog-lbl');
  pw.style.display = 'block';
  var done = 0;
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    lbl.textContent = '업로드 중... (' + (i+1) + '/' + files.length + ')';
    fill.style.width = ((i+1)/files.length*100) + '%';
    try {
      var fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', PRESET);
      fd.append('folder', 'baby-gallery');
      var cr = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD + '/image/upload', { method:'POST', body:fd });
      var cd = await cr.json();
      if (cd.error) throw new Error(cd.error.message);
      var at = new Date().toISOString();
      await fetch(GAS + '?action=add&url=' + encodeURIComponent(cd.secure_url) + '&name=' + encodeURIComponent(file.name) + '&uploadedAt=' + at);
      renderCard({ url: cd.secure_url, name: file.name }, true);
      done++; updateUI();
    } catch(e) { console.error(e); toast('업로드 실패: ' + file.name); }
  }
  setTimeout(closeModal, 500);
  if (done > 0) toast(done + '장 업로드 완료 🎉', 3000);
}

function openLightbox(item, card) {
  lbItem = item; lbCard = card;
  document.getElementById('lb-img').src = item.url;
  document.getElementById('lb-name').textContent = item.name || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  lbItem = null; lbCard = null;
}
document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) closeLightbox(); });

document.getElementById('lb-del-btn').addEventListener('click', async function() {
  if (!lbItem) return;
  if (!confirm('이 사진을 삭제할까요?')) return;
  try {
    await fetch(GAS + '?action=delete&url=' + encodeURIComponent(lbItem.url));
    if (lbCard) lbCard.remove();
    updateUI(); closeLightbox();
    toast('사진이 삭제되었습니다');
  } catch(e) { toast('삭제 중 오류가 발생했습니다'); }
});

document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ closeLightbox(); closeModal(); } });

var zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e){ e.preventDefault(); zone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
document.getElementById('file-input').addEventListener('change', function(e){
  if (e.target.files && e.target.files.length) handleFiles(e.target.files);
  e.target.value = '';
});

loadPhotos();
</script>
</body>
</html>
