<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍼 우리 아기 갤러리</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #FFF8F0;
  --peach: #FFD6C0;
  --rose: #FF8B6B;
  --rose-dark: #E5623E;
  --mint: #C8F0E8;
  --mint-dark: #4ABFA3;
  --lavender: #E8D5F5;
  --lav-dark: #9B6DC7;
  --yellow: #FFF0A0;
  --text: #3A2E28;
  --muted: #9A8880;
  --surface: #ffffff;
  --radius: 20px;
  --radius-lg: 28px;
}
body {
  font-family: 'Nunito', -apple-system, sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Hero ── */
.hero {
  position: relative;
  background: linear-gradient(160deg, #FFF0E8 0%, #F5E8FF 50%, #E8F5FF 100%);
  padding: 2.5rem 2rem 3rem;
  overflow: hidden;
  text-align: center;
}
.hero::before {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,180,140,0.3) 0%, transparent 70%);
  top: -80px; right: -60px;
  border-radius: 50%;
}
.hero::after {
  content: '';
  position: absolute;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(180,140,255,0.2) 0%, transparent 70%);
  bottom: -40px; left: -40px;
  border-radius: 50%;
}

/* floating blobs */
.blob {
  position: absolute;
  border-radius: 50%;
  opacity: 0.5;
  animation: float 6s ease-in-out infinite;
}
.blob-1 { width:60px; height:60px; background:#FFD6C0; top:20px; left:10%; animation-delay:0s; }
.blob-2 { width:40px; height:40px; background:#C8F0E8; top:60px; right:15%; animation-delay:1.5s; }
.blob-3 { width:30px; height:30px; background:#E8D5F5; bottom:30px; left:20%; animation-delay:3s; }
.blob-4 { width:50px; height:50px; background:#FFF0A0; bottom:20px; right:10%; animation-delay:0.8s; }
@keyframes float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-12px) rotate(5deg); }
}

.hero-content { position: relative; z-index: 2; }

/* SVG 아기 일러스트 */
.hero-illustration {
  width: 160px;
  height: 160px;
  margin: 0 auto 1.2rem;
  animation: bounce 3s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.hero-title {
  font-size: 28px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.hero-title span {
  background: linear-gradient(135deg, #FF8B6B, #C87FD4);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 1.5rem;
  font-weight: 600;
}
.hero-stats {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: white;
  border-radius: 30px;
  padding: 8px 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.hero-stats .count {
  font-size: 20px;
  font-weight: 900;
  color: var(--rose);
}

/* ── Upload FAB ── */
.fab {
  position: fixed;
  bottom: 28px;
  right: 24px;
  z-index: 100;
  width: 60px; height: 60px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF8B6B, #C87FD4);
  border: none;
  color: white;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(255,100,80,0.4);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, box-shadow 0.2s;
  animation: pulse-fab 3s ease-in-out infinite;
}
.fab:hover { transform: scale(1.1); box-shadow: 0 8px 32px rgba(255,100,80,0.5); }
@keyframes pulse-fab {
  0%,100% { box-shadow: 0 6px 24px rgba(255,100,80,0.4); }
  50% { box-shadow: 0 6px 36px rgba(200,127,212,0.6); }
}

/* ── Gallery ── */
.gallery-section { padding: 1.5rem 1.25rem 6rem; }

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

/* masonry feel - every 7th card is big */
.photo-card:nth-child(7n+1) {
  grid-column: span 2;
  grid-row: span 2;
}

.photo-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--peach);
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
}
.photo-card:nth-child(7n+1) { aspect-ratio: auto; }
.photo-card:hover { transform: scale(1.02); }
.photo-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.photo-card:hover img { transform: scale(1.05); }

/* 귀여운 카드 테두리 색상 */
.photo-card:nth-child(4n+1) { box-shadow: 0 4px 16px rgba(255,139,107,0.25); }
.photo-card:nth-child(4n+2) { box-shadow: 0 4px 16px rgba(155,109,199,0.2); }
.photo-card:nth-child(4n+3) { box-shadow: 0 4px 16px rgba(74,191,163,0.2); }
.photo-card:nth-child(4n+4) { box-shadow: 0 4px 16px rgba(255,200,80,0.25); }

/* ── Lightbox (삭제버튼 여기에) ── */
.lightbox {
  position: fixed; inset: 0;
  background: rgba(20,15,10,0.92);
  display: none; align-items: center; justify-content: center;
  z-index: 300;
  flex-direction: column;
  gap: 16px;
  padding: 1.5rem;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 92vw; max-height: 72vh;
  border-radius: var(--radius);
  object-fit: contain;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.lightbox-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
.lightbox-close {
  background: rgba(255,255,255,0.15);
  border: none; border-radius: 50%;
  width: 48px; height: 48px;
  color: #fff; font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  transition: background 0.15s;
}
.lightbox-close:hover { background: rgba(255,255,255,0.25); }
.lightbox-delete {
  background: rgba(255,80,60,0.85);
  border: none; border-radius: 24px;
  padding: 12px 24px;
  color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-family: 'Nunito', sans-serif;
  backdrop-filter: blur(8px);
  transition: background 0.15s, transform 0.1s;
}
.lightbox-delete:hover { background: rgba(220,50,30,0.9); transform: scale(1.03); }
.lightbox-name {
  color: rgba(255,255,255,0.6);
  font-size: 12px; font-weight: 600;
  text-align: center;
  max-width: 280px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 200;
}
.modal-backdrop.open { display: flex; }
.modal-sheet {
  background: var(--surface);
  border-radius: 28px 28px 0 0;
  width: 100%; max-width: 600px;
  padding: 1.5rem 1.75rem 2.5rem;
  animation: slideUp 0.3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp { from{transform:translateY(80px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-handle { width:40px; height:4px; border-radius:2px; background:#E8E0D8; margin:0 auto 1.25rem; }
.modal-title { font-size:18px; font-weight:800; margin-bottom:1.25rem; }
.upload-zone {
  border: 2.5px dashed #FFCDB8;
  border-radius: var(--radius);
  background: #FFF8F4;
  padding: 2.5rem 1.5rem;
  text-align: center; cursor: pointer; transition: all 0.2s;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--rose); background: #FFF0E8; }
.upload-zone-icon { font-size: 40px; margin-bottom: 10px; }
.upload-zone-title { font-size: 15px; font-weight: 800; margin-bottom: 6px; }
.upload-zone-desc { font-size: 13px; color: var(--muted); font-weight: 600; }
.progress-wrap { margin-top: 1rem; display: none; }
.progress-track { background: #FFE8DC; border-radius: 20px; height: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--rose), #C87FD4); border-radius: 20px; width: 0%; transition: width 0.25s; }
.progress-label { font-size: 12px; color: var(--rose); margin-top: 6px; text-align: center; font-weight: 700; }

/* ── Empty ── */
.empty-state { text-align: center; padding: 3rem 1rem; display: none; }
.empty-state.show { display: block; }
.empty-anim { font-size: 64px; margin-bottom: 14px; animation: wiggle 2s ease-in-out infinite; }
@keyframes wiggle { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
.empty-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.empty-sub { font-size: 13px; color: var(--muted); font-weight: 600; }

/* ── Loading ── */
.loading-wrap { text-align: center; padding: 4rem 2rem; display: none; }
.loading-wrap.show { display: block; }
.loading-hearts { font-size: 32px; animation: heartbeat 1s ease-in-out infinite; }
@keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
.loading-text { font-size: 13px; color: var(--muted); margin-top: 12px; font-weight: 700; }

/* ── Toast ── */
.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(60px); background:#3A2E28; color:#fff; padding:12px 22px; border-radius:24px; font-size:14px; font-weight:700; white-space:nowrap; transition:transform 0.3s cubic-bezier(.34,1.56,.64,1); z-index:500; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }

@media(max-width:480px) {
  .hero { padding: 2rem 1.25rem 2.5rem; }
  .hero-title { font-size: 24px; }
  .gallery-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
  .gallery-section { padding: 1rem 1rem 6rem; }
}
</style>
</head>
<body>

<!-- ── Hero ── -->
<section class="hero">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="hero-content">

    <!-- 아기 SVG 일러스트 -->
    <div class="hero-illustration">
      <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <!-- 배경 원 -->
        <circle cx="80" cy="80" r="75" fill="#FFF0E8" opacity="0.8"/>
        <!-- 몸 -->
        <ellipse cx="80" cy="105" rx="32" ry="28" fill="#FFDCC8"/>
        <!-- 옷 -->
        <ellipse cx="80" cy="115" rx="32" ry="20" fill="#FFB8D4"/>
        <!-- 별 장식 -->
        <text x="65" y="120" font-size="10" fill="white" font-weight="bold">★ ★</text>
        <!-- 머리 -->
        <circle cx="80" cy="72" r="30" fill="#FFDCC8"/>
        <!-- 귀 -->
        <circle cx="50" cy="74" r="8" fill="#FFDCC8"/>
        <circle cx="110" cy="74" r="8" fill="#FFDCC8"/>
        <circle cx="50" cy="74" r="5" fill="#FFB8A8"/>
        <circle cx="110" cy="74" r="5" fill="#FFB8A8"/>
        <!-- 머리카락 -->
        <path d="M56 50 Q80 35 104 50 Q100 42 80 38 Q60 42 56 50Z" fill="#8B5A3C"/>
        <path d="M58 48 Q62 40 68 44" stroke="#8B5A3C" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M102 48 Q98 40 92 44" stroke="#8B5A3C" stroke-width="3" fill="none" stroke-linecap="round"/>
        <!-- 눈 -->
        <ellipse cx="68" cy="72" rx="6" ry="7" fill="white"/>
        <ellipse cx="92" cy="72" rx="6" ry="7" fill="white"/>
        <circle cx="69" cy="73" r="4" fill="#5C3D2E"/>
        <circle cx="93" cy="73" r="4" fill="#5C3D2E"/>
        <circle cx="70" cy="71" r="1.5" fill="white"/>
        <circle cx="94" cy="71" r="1.5" fill="white"/>
        <!-- 속눈썹 -->
        <path d="M63 66 Q65 63 68 65" stroke="#8B5A3C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

        <ellipse cx="112" cy="108" rx="10" ry="7" fill="#FFDCC8" transform="rotate(20 112 108)"/>

        <!-- 손가락 힌트 -->
        <circle cx="38" cy="116" r="3" fill="#FFB8A8"/>

        <circle cx="114" cy="119" r="3" fill="#FFB8A8"/>
        <circle cx="120" cy="116" r="3" fill="#FFB8A8"/>

        <path d="M62 50 L65 42 L72 48 L80 38 L88 48 L95 42 L98 50Z" fill="#FFD700" stroke="#FFA500" stroke-width="1"/>
        <circle cx="80" cy="40" r="3" fill="#FF6B9D"/>

        <!-- 반짝이 -->
        <text x="20" y="40" font-size="14" opacity="0.7">✨</text>
        <text x="125" y="50" font-size="12" opacity="0.6">⭐</text>

    </div>

    <h1 class="hero-title">우리 <span>아기</span> 갤러리</h1>
    <p class="hero-sub">소중한 순간들을 모아모아 🌸</p>
    <div class="hero-stats">
      <span>📸</span>
      <span class="count" id="photo-count">0</span>
      <span>장의 추억</span>
    </div>
  </div>
</section>

<!-- ── Gallery ── -->
<section class="gallery-section">
  <div class="loading-wrap show" id="loading-wrap">
    <div class="loading-hearts">🍼</div>
    <div class="loading-text">사진 불러오는 중...</div>
  </div>
  <div class="gallery-grid" id="gallery"></div>
  <div class="empty-state" id="empty-state">
    <div class="empty-anim">📷</div>
    <div class="empty-title">아직 사진이 없어요</div>
    <div class="empty-sub">아래 + 버튼을 눌러<br>첫 번째 사진을 올려보세요 ☺️</div>
  </div>
</section>

<!-- ── FAB ── -->
<button class="fab" onclick="openModal()" aria-label="사진 추가">＋</button>

<!-- ── Upload Modal ── -->
<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📷 사진 추가하기</div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" multiple style="display:none">
      <div class="upload-zone-icon">🖼️</div>
      <div class="upload-zone-title">클릭하거나 여기에 드래그</div>
      <div class="upload-zone-desc">여러 장 동시 업로드 · JPG PNG WEBP GIF</div>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">업로드 중...</div>
    </div>
  </div>
</div>

<!-- ── Lightbox (삭제버튼 여기에만) ── -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()">
  <div class="lightbox-name" id="lightbox-name"></div>
  <div class="lightbox-actions">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <button class="lightbox-delete" id="lightbox-delete-btn">🗑 삭제</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var CLOUD   = 'djmvsyi3g';
var PRESET  = 'baby_gallery';
var GAS_URL = 'https://script.google.com/macros/s/AKfycby2h5oFWj3by-JAJbJ8S8slKET71MD_Baci_BRkXT1srfDITNCXfn35oo_L94gLoaic/exec';

var currentLightboxItem = null;
var currentLightboxCard = null;

function showToast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, dur||2500);
}

function updateUI() {
  var n = document.querySelectorAll('.photo-card').length;
  document.getElementById('photo-count').textContent = n;
  document.getElementById('empty-state').classList.toggle('show', n === 0);
}

function openModal() {
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

async function loadPhotos() {
  document.getElementById('loading-wrap').classList.add('show');
  document.getElementById('gallery').innerHTML = '';
  try {
    var res  = await fetch(GAS_URL + '?action=list&_=' + Date.now());
    var list = await res.json();
    if (Array.isArray(list)) list.forEach(function(item){ renderCard(item, false); });
  } catch(e) { console.error(e); }
  document.getElementById('loading-wrap').classList.remove('show');
  updateUI();
}

function renderCard(item, prepend) {
  var grid = document.getElementById('gallery');
  var card = document.createElement('div');
  card.className = 'photo-card';

  var img = document.createElement('img');
  img.src = item.url;
  img.alt = item.name || '';
  img.loading = 'lazy';

  card.appendChild(img);
  card.addEventListener('click', function() {
    openLightbox(item, card);
  });

  if (prepend && grid.firstChild) grid.insertBefore(card, grid.firstChild);
  else grid.appendChild(card);
}

async function handleFiles(fileList) {
  var files = Array.from(fileList).filter(function(f){ return f.type.startsWith('image/'); });
  if (!files.length) { showToast('이미지 파일만 업로드할 수 있어요'); return; }

  var pw = document.getElementById('progress-wrap');
  var fill = document.getElementById('progress-fill');
  var lbl  = document.getElementById('progress-label');
  pw.style.display = 'block';

  var done = 0;
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    lbl.textContent = '업로드 중... (' + (i+1) + '/' + files.length + ')  ' + file.name;
    fill.style.width = ((i+1)/files.length*100) + '%';
    try {
      var fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', PRESET);
      fd.append('folder', 'baby-gallery');
      var cRes  = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD + '/image/upload', { method:'POST', body:fd });
      var cData = await cRes.json();
      if (cData.error) throw new Error(cData.error.message);
      var uploadedAt = new Date().toISOString();
      await fetch(GAS_URL + '?action=add&url=' + encodeURIComponent(cData.secure_url) + '&name=' + encodeURIComponent(file.name) + '&uploadedAt=' + uploadedAt);
      var item = { url: cData.secure_url, name: file.name, uploadedAt: uploadedAt };
      renderCard(item, true);
      done++;
      updateUI();
    } catch(e) {
      console.error(e);
      showToast('업로드 실패: ' + file.name);
    }
  }
  setTimeout(closeModal, 500);
  if (done > 0) showToast(done + '장 업로드 완료 🎉', 3000);
}

// ── Lightbox ── 삭제버튼은 여기서만!
function openLightbox(item, card) {
  currentLightboxItem = item;
  currentLightboxCard = card;
  document.getElementById('lightbox-img').src = item.url;
  document.getElementById('lightbox-name').textContent = item.name || '';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  currentLightboxItem = null;
  currentLightboxCard = null;
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

document.getElementById('lightbox-delete-btn').addEventListener('click', async function() {
  if (!currentLightboxItem) return;
  if (!confirm('이 사진을 삭제할까요?')) return;
  try {
    await fetch(GAS_URL + '?action=delete&url=' + encodeURIComponent(currentLightboxItem.url));
    if (currentLightboxCard) currentLightboxCard.remove();
    updateUI();
    closeLightbox();
    showToast('사진이 삭제되었습니다');
  } catch(e) {
    showToast('삭제 중 오류가 발생했습니다');
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') { closeLightbox(); closeModal(); }
});

var zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e){ e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function(){ zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e){ e.preventDefault(); zone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
document.getElementById('file-input').addEventListener('change', function(e){
  if (e.target.files && e.target.files.length) handleFiles(e.target.files);
  e.target.value = '';
});

loadPhotos();
</script>
</body>
</html>
