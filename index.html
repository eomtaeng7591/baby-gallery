<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍼 아기 사진 갤러리</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink-light: #FBEAF0; --pink-mid: #F4C0D1; --pink: #D4537E; --pink-dark: #993556;
    --bg: #fff9fb; --surface: #ffffff; --border: rgba(212,83,126,0.15);
    --text: #2C2C2A; --muted: #888780; --radius: 16px;
  }
  body { font-family: -apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .site-header { background:var(--surface); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:38px; height:38px; border-radius:50%; background:var(--pink-light); display:flex; align-items:center; justify-content:center; font-size:18px; }
  .logo-text { font-size:17px; font-weight:700; }
  .logo-sub { font-size:11px; color:var(--muted); }
  .header-right { display:flex; align-items:center; gap:8px; }
  .stat-pill { background:var(--pink-light); color:var(--pink-dark); font-size:13px; font-weight:700; padding:5px 13px; border-radius:20px; }
  .btn-upload-header { background:var(--pink); color:#fff; border:none; border-radius:20px; padding:7px 16px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; font-family:inherit; transition:background 0.15s; }
  .btn-upload-header:hover { background:var(--pink-dark); }
  .btn-refresh { background:none; border:1px solid var(--border); color:var(--muted); font-size:13px; padding:6px 13px; border-radius:20px; cursor:pointer; font-family:inherit; }
  .btn-refresh:hover { background:var(--pink-light); }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:flex-end; justify-content:center; z-index:200; }
  .modal-backdrop.open { display:flex; }
  .modal-sheet { background:var(--surface); border-radius:24px 24px 0 0; width:100%; max-width:640px; padding:1.5rem 2rem 2.5rem; animation:slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal-handle { width:40px; height:4px; border-radius:2px; background:var(--pink-mid); margin:0 auto 1.25rem; }
  .modal-title { font-size:16px; font-weight:700; margin-bottom:1.25rem; }
  .upload-zone { border:2px dashed var(--pink-mid); border-radius:var(--radius); background:var(--bg); padding:2.5rem 2rem; text-align:center; cursor:pointer; transition:all 0.2s; }
  .upload-zone:hover, .upload-zone.drag { border-color:var(--pink); background:var(--pink-light); }
  .upload-icon { font-size:36px; margin-bottom:10px; }
  .upload-title { font-size:15px; font-weight:700; margin-bottom:6px; }
  .upload-desc { font-size:13px; color:var(--muted); line-height:1.7; }
  .format-badge { display:inline-block; margin-top:10px; background:var(--pink-light); color:var(--pink-dark); font-size:12px; font-weight:600; padding:4px 12px; border-radius:20px; }
  .progress-wrap { margin-top:1rem; display:none; }
  .progress-track { background:var(--pink-light); border-radius:20px; height:8px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--pink); border-radius:20px; width:0%; transition:width 0.25s; }
  .progress-label { font-size:12px; color:var(--pink-dark); margin-top:6px; text-align:center; }
  .gallery-section { padding:1.5rem 2rem 4rem; }
  .gallery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; }
  .photo-card { position:relative; border-radius:var(--radius); overflow:hidden; aspect-ratio:1; background:#f3e8ee; border:1px solid var(--border); cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; }
  .photo-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(212,83,126,0.15); }
  .photo-card img { width:100%; height:100%; object-fit:cover; display:block; }
  .photo-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.38); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; }
  .photo-card:hover .photo-overlay { opacity:1; }
  .btn-delete { background:rgba(255,255,255,0.93); border:none; border-radius:50%; width:44px; height:44px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:18px; transition:transform 0.1s; }
  .btn-delete:hover { transform:scale(1.12); }
  .photo-name { position:absolute; bottom:0; left:0; right:0; padding:24px 8px 7px; background:linear-gradient(transparent,rgba(0,0,0,0.55)); color:#fff; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:0; transition:opacity 0.2s; }
  .photo-card:hover .photo-name { opacity:1; }
  .empty-state { text-align:center; padding:5rem 2rem; display:none; }
  .empty-state.show { display:block; }
  .empty-icon { font-size:64px; margin-bottom:16px; }
  .empty-title { font-size:18px; font-weight:700; margin-bottom:8px; }
  .empty-sub { font-size:13px; color:var(--muted); line-height:1.8; }
  .btn-empty-upload { margin-top:20px; display:inline-flex; align-items:center; gap:8px; background:var(--pink); color:#fff; border:none; border-radius:24px; padding:12px 24px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; transition:background 0.15s; }
  .btn-empty-upload:hover { background:var(--pink-dark); }
  .lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:300; padding:2rem; }
  .lightbox.open { display:flex; }
  .lightbox img { max-width:90vw; max-height:88vh; border-radius:var(--radius); object-fit:contain; }
  .lightbox-close { position:fixed; top:16px; right:20px; background:rgba(255,255,255,0.15); border:none; border-radius:50%; width:44px; height:44px; color:#fff; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .lightbox-close:hover { background:rgba(255,255,255,0.28); }
  .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(80px); background:#2C2C2A; color:#fff; padding:11px 22px; border-radius:24px; font-size:14px; white-space:nowrap; transition:transform 0.3s cubic-bezier(.34,1.56,.64,1); z-index:400; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); }
  .loading-wrap { text-align:center; padding:3rem; color:var(--muted); font-size:14px; }
  .spinner { width:32px; height:32px; border:3px solid var(--pink-mid); border-top-color:var(--pink); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  @media(max-width:600px) {
    .site-header{padding:0.9rem 1rem;} .gallery-section{padding:1rem 1rem 4rem;}
    .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
    .logo-sub{display:none;} .modal-sheet{padding:1.25rem 1.25rem 2rem;}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    <div class="logo-icon">🍼</div>
    <div>
      <div class="logo-text">아기 사진 갤러리</div>
      <div class="logo-sub">소중한 순간들을 담아보세요</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-pill" id="stat-pill">0장</div>
    <button class="btn-refresh" onclick="loadPhotos()">↻ 새로고침</button>
    <button class="btn-upload-header" onclick="openModal()">＋ 사진 추가</button>
  </div>
</header>

<section class="gallery-section">
  <div id="loading-wrap" class="loading-wrap">
    <div class="spinner"></div>
    사진 불러오는 중...
  </div>
  <div class="gallery-grid" id="gallery"></div>
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">📸</div>
    <div class="empty-title">아직 사진이 없어요</div>
    <div class="empty-sub">첫 번째 사진을 올려보세요 ☺️</div>
    <button class="btn-empty-upload" onclick="openModal()">＋ 사진 추가하기</button>
  </div>
</section>

<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">📷 사진 추가</div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" multiple style="display:none">
      <div class="upload-icon">🖼️</div>
      <div class="upload-title">클릭하거나 파일을 여기에 드래그</div>
      <div class="upload-desc">여러 장 동시 업로드 가능</div>
      <span class="format-badge">JPG · PNG · WEBP · GIF</span>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">업로드 중...</div>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  설정값
// ══════════════════════════════════════════════════
const CLOUD  = 'djmvsyi3g';
const PRESET = 'baby_gallery';
const FOLDER = 'baby-gallery';

// ── Toast ─────────────────────────────────────────
function showToast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, dur || 2500);
}

// ── UI ────────────────────────────────────────────
function updateUI() {
  var n = document.querySelectorAll('.photo-card').length;
  document.getElementById('stat-pill').textContent = n + '장';
  document.getElementById('empty-state').classList.toggle('show', n === 0);
}

// ── Modal ─────────────────────────────────────────
function openModal() {
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress-fill').style.width = '0%';
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

// ── 사진 목록 불러오기 (Cloudinary Search API) ────
async function loadPhotos() {
  var loading = document.getElementById('loading-wrap');
  var grid    = document.getElementById('gallery');
  loading.style.display = 'block';
  grid.innerHTML = '';

  try {
    // Cloudinary의 /image/list/{tag}.json 엔드포인트 사용
    // 업로드 시 태그를 붙여서 목록을 조회합니다
    var url = 'https://res.cloudinary.com/' + CLOUD + '/image/list/' + FOLDER + '.json';
    var res = await fetch(url + '?_=' + Date.now());

    if (!res.ok) throw new Error(res.status);
    var data = await res.json();

    var resources = (data.resources || []).sort(function(a, b) {
      return (b.created_at || '').localeCompare(a.created_at || '');
    });

    resources.forEach(function(r) {
      var imgUrl = 'https://res.cloudinary.com/' + CLOUD + '/image/upload/q_auto,f_auto,w_600/' + r.public_id;
      var fullUrl = 'https://res.cloudinary.com/' + CLOUD + '/image/upload/q_auto/' + r.public_id;
      renderCard(r.public_id, imgUrl, fullUrl, r.public_id.split('/').pop());
    });

  } catch(e) {
    console.warn('목록 로드 실패, 빈 갤러리로 시작합니다.', e);
  }

  loading.style.display = 'none';
  updateUI();
}

// ── 카드 렌더 ─────────────────────────────────────
function renderCard(publicId, thumbUrl, fullUrl, name, prepend) {
  var grid = document.getElementById('gallery');
  var card = document.createElement('div');
  card.className = 'photo-card';
  card.dataset.publicId = publicId;

  var img = document.createElement('img');
  img.src = thumbUrl;
  img.alt = name || '';
  img.loading = 'lazy';

  var overlay = document.createElement('div');
  overlay.className = 'photo-overlay';
  var delBtn = document.createElement('button');
  delBtn.className = 'btn-delete';
  delBtn.textContent = '🗑';
  delBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (confirm('이 사진을 삭제할까요?')) {
      card.remove();
      updateUI();
      showToast('사진이 삭제되었습니다');
    }
  });
  overlay.appendChild(delBtn);

  var nameDiv = document.createElement('div');
  nameDiv.className = 'photo-name';
  nameDiv.textContent = name || '';

  card.appendChild(img);
  card.appendChild(overlay);
  card.appendChild(nameDiv);
  card.addEventListener('click', function(e) {
    if (e.target.closest('.btn-delete')) return;
    openLightbox(fullUrl);
  });

  if (prepend && grid.firstChild) {
    grid.insertBefore(card, grid.firstChild);
  } else {
    grid.appendChild(card);
  }
}

// ── 업로드 ────────────────────────────────────────
async function handleFiles(fileList) {
  var files = Array.from(fileList).filter(function(f) {
    return f.type.startsWith('image/');
  });
  if (!files.length) { showToast('이미지 파일만 업로드할 수 있어요'); return; }

  var pw   = document.getElementById('progress-wrap');
  var fill = document.getElementById('progress-fill');
  var lbl  = document.getElementById('progress-label');
  pw.style.display = 'block';

  var done = 0;
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    lbl.textContent = '업로드 중... (' + (i+1) + '/' + files.length + ')  ' + file.name;
    fill.style.width = ((i+1) / files.length * 100) + '%';

    try {
      var fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', PRESET);
      fd.append('folder', FOLDER);
      fd.append('tags', FOLDER);   // ← 태그로 목록 조회를 위해 반드시 필요

      var res  = await fetch('https://api.cloudinary.com/v1_1/' + CLOUD + '/image/upload', {
        method: 'POST', body: fd
      });
      var data = await res.json();
      if (data.error) throw new Error(data.error.message);

      var thumbUrl = 'https://res.cloudinary.com/' + CLOUD + '/image/upload/q_auto,f_auto,w_600/' + data.public_id;
      var fullUrl  = data.secure_url;
      renderCard(data.public_id, thumbUrl, fullUrl, file.name, true);
      done++;
      updateUI();
    } catch(e) {
      console.error('업로드 실패:', e);
      showToast('업로드 실패: ' + file.name + ' (' + (e.message || '') + ')');
    }
  }

  setTimeout(closeModal, 500);
  if (done > 0) showToast(done + '장 업로드 완료 🎉', 3000);
}

// ── Lightbox ──────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeLightbox(); closeModal(); }
});

// ── Drag & drop ───────────────────────────────────
var zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', function() { zone.classList.remove('drag'); });
zone.addEventListener('drop', function(e) { e.preventDefault(); zone.classList.remove('drag'); handleFiles(e.dataTransfer.files); });
document.getElementById('file-input').addEventListener('change', function(e) {
  if (e.target.files && e.target.files.length) handleFiles(e.target.files);
  e.target.value = '';
});

// ── 시작 ─────────────────────────────────────────
loadPhotos();
</script>
</body>
</html>
